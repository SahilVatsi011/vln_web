<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}VLN Robot System{% endblock %}</title>

  <!-- Google Fonts: Inter, JetBrains Mono, Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Shared Design Tokens & Reset -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}">

  <!-- Page-specific styles -->
  {% block styles %}{% endblock %}
</head>
<body>
  {% block body %}{% endblock %}

  <!-- Page-specific scripts -->
  {% block scripts %}{% endblock %}
</body>
</html>
